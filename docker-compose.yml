services:
  # 1. El servicio de la Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # IMPORTANTE: Esto le avisa a Docker cuándo Postgres terminó de arrancar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. El servicio de FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    # MODIFICADO: Espera a que la BD esté sana (healthy) antes de arrancar
    depends_on:
      db:
        condition: service_healthy
    # MODIFICADO: Primero corre Alembic, si pasa, levanta Uvicorn
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment: 
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

volumes:
  postgres_data: